<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Computer Vision Playground</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
  </head>

  <body>
    <h1 class="title">Computer Vision Playground</h1>
    <div class="main">
      <div class="container">
        <form action="/upload" method="post" enctype="multipart/form-data">
          <label for="file">Select Image:</label>
          <div class="drop-zone" id="dropZone">
            <p>Drag & Drop Image Here or Click to Upload</p>
            <input type="file" id="fileInput" name="file" hidden />
          </div>

          <label for="model">Select CV Model:</label>
          <select name="operation" id="model">
            <option value="edge">Edge Detection</option>
            <option value="gaussian">Gaussian Blur</option>
            <option value="grayscale">Grayscale</option>
          </select>
          <button type="submit">Upload</button>
        </form>
        <br />
      </div>

      <div class="result">
        {% if output_image %}
        <img src="/uploads/{{ output_image.split('/')[-1] }}" width="300" />
        {% else %}
        <div class="placeholder">
          <div class="icon">🖼️</div>

          <p>No image uploaded</p>
          <span>Upload an image to see results</span>
        </div>
        {% endif %}
      </div>
    </div>
  </body>
</html>

<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

dropZone.addEventListener("click", () => fileInput.click());

dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const file = e.dataTransfer.files[0];
    if (file) {
        fileInput.files = e.dataTransfer.files;
        showPreview(file);
    }
});

fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) {
        showPreview(fileInput.files[0]);
    }
});

function showPreview(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
        preview.src = e.target.result;
        preview.style.display = "block";
    };
    reader.readAsDataURL(file);
}

document.getElementById("uploadForm").addEventListener("submit", function(e) {
    if (fileInput.files.length === 0) {
        e.preventDefault();
        alert("You have not selected a picture!");
    }
});
</script>
