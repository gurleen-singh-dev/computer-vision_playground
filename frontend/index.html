<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Computer Vision Playground</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">

  </head>

  <body>
    <h1 class="title">Computer Vision Playground</h1>
    <div class="page">
      <form action="/upload" method="post" enctype="multipart/form-data">
        <label for="file">Select Image:</label>
        <input type="file" id="file" name="file" />
        <br /><br />

        <label for="model">Select CV Model:</label>
        <select name="model" id="model">
          <option value="face">Face Detection</option>
          <option value="object">Object Detection</option>
          <option value="edge">Edge Detection</option>
        </select>

        <br /><br />
        <button type="submit">Upload</button>
      </form>
      <br />
      <div class="result"><img id="output" src="" alt="Processed image" /></div>
    </div>
  </body>
</html>
