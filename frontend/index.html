<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Computer Vision Playground</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
  </head>

  <script src="{{ url_for('static', path='/script.js') }}" defer></script>
  <body>
    <h1 class="title">Computer Vision Playground</h1>
    <div class="main">
      <div class="container">
        <form
          id="uploadForm"
          action="/upload"
          method="post"
          enctype="multipart/form-data"
        >
          <label for="file">Select Image:</label>
          <div class="drop-zone" id="dropZone">
            <p id="dropText">Drag & Drop Image Here or Click to Upload</p>

            <img id="preview" alt="Preview" />

            <input
              type="file"
              id="fileInput"
              name="file"
              accept="image/*"
              hidden
            />
          </div>

          <label for="model">Select CV Model:</label>
          <select name="operation" id="model">
            <option value="edge">Edge Detection</option>
            <option value="gaussian">Gaussian Blur</option>
            <option value="grayscale">Grayscale</option>
          </select>
          <button type="submit">Upload</button>
        </form>
        <br />
      </div>

      <div class="result">
        {% if output_image %}
        <img src="/uploads/{{ output_image.split('/')[-1] }}" width="300" />
        {% else %}
        <div class="placeholder">
          <div class="icon">🖼️</div>

          <p>No image uploaded</p>
          <span>Upload an image to see results</span>
        </div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
